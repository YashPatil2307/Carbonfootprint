<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login & Register</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="container">
        <div class="form-box">
            <h2 id="formTitle">Login</h2>

            <form id="loginForm">
                <input type="text" id="loginName" placeholder="Enter Name" required />
                <input type="email" id="loginEmail" placeholder="Enter Email" required />
                <input type="password" id="loginPassword" placeholder="Enter Password" required />
                <button type="submit">Login</button>
                <p>
                    Not registered?
                    <a href="#" id="showRegister">Register here</a>
                </p>
            </form>

            <form id="registerForm" style="display: none;">
                <input type="text" id="registerName" placeholder="Enter Name" required />
                <input type="email" id="registerEmail" placeholder="Enter Email" required />
                <input type="password" id="registerPassword" placeholder="Enter Password" required />
                <input type="password" id="confirmPassword" placeholder="Confirm Password" required />
                <button type="submit">Register</button>
                <p>
                    Already have an account?
                    <a href="#" id="showLogin">Login here</a>
                </p>
            </form>

            <p id="message"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
